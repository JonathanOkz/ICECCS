[profile.default]
src = "src"
out = "out"
test = "test"
script = "script"
libs = ["lib"]
solc_version = "0.8.36"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "shanghai"

[profile.experiment]
isolate = true
chain_id = 31337
gas_limit = 30_000_000_000
block_gas_limit = 30_000_000_000
fs_permissions = [{ access = "read-write", path = "./results" }]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
